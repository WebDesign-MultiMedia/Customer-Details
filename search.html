<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Awsome Font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- TailwindCss -->
    <link rel="stylesheet" href="./src/output.css" />
    <!-- SweetAlert -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.22.2/dist/sweetalert2.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Metamorphous&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mozilla+Headline:wght@200..700&family=Playwrite+AU+QLD:wght@100..400&family=Playwrite+HU:wght@100..400&display=swap"
      rel="stylesheet"
    />
    <title>Search Customer Order</title>
  </head>
  <body class="page-shell font-form1 text-white">
    <div class="blob bg-brand-teal w-72 h-72 -top-10 -right-10 animate-float-slow"></div>
    <div class="blob bg-brand-terracotta w-64 h-64 top-1/2 -left-16 animate-float"></div>

    <main class="relative z-10 flex flex-col items-center px-4 py-10">
      <!-- Papel picado banner -->
      <div class="w-full h-14 sm:h-16 mb-2 select-none pointer-events-none no-print">
        <svg viewBox="0 0 800 60" preserveAspectRatio="xMidYMin meet" class="w-full h-full">
          <line x1="0" y1="4" x2="800" y2="4" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
          <g transform="translate(0,0)"><polygon points="2,4 62,4 32,52" fill="#f2b134"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(73,0)"><polygon points="2,4 62,4 32,52" fill="#e94f9b"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(146,0)"><polygon points="2,4 62,4 32,52" fill="#0fa89a"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(219,0)"><polygon points="2,4 62,4 32,52" fill="#c1502e"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(292,0)"><polygon points="2,4 62,4 32,52" fill="#4f8a5b"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(365,0)"><polygon points="2,4 62,4 32,52" fill="#f2b134"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(438,0)"><polygon points="2,4 62,4 32,52" fill="#e94f9b"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(511,0)"><polygon points="2,4 62,4 32,52" fill="#0fa89a"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(584,0)"><polygon points="2,4 62,4 32,52" fill="#c1502e"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(657,0)"><polygon points="2,4 62,4 32,52" fill="#4f8a5b"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
          <g transform="translate(730,0)"><polygon points="2,4 62,4 32,52" fill="#f2b134"/><circle cx="32" cy="16" r="3.5" fill="#fdf8ee" opacity="0.4"/></g>
        </svg>
      </div>

      <div class="flex flex-col items-center mb-6 stagger-in">
        <img src="./imgs/BLFM-logo.PNG" alt="logo" class="w-16 h-16 object-contain drop-shadow-lg" />
        <h1 class="font-headings text-2xl sm:text-3xl shimmer-text text-center mt-2">Search Orders</h1>
        <p class="text-brand-goldlight/80 text-sm tracking-widest uppercase">By phone, name, address, date, or month</p>
      </div>

      <div class="tilt-wrap w-full max-w-lg stagger-in">
        <div data-tilt data-tilt-max="3" class="tilt glass-card p-5 flex flex-col sm:flex-row gap-3 sm:items-end">
          <div class="field-group w-full sm:w-36">
            <label for="searchField" class="field-label"><i class="fa-solid fa-filter"></i> Search by</label>
            <select id="searchField" class="input-3d text-center">
              <option value="Contact">Phone</option>
              <option value="Name">Name</option>
              <option value="Address">Address</option>
              <option value="Date">Date</option>
              <option value="Month">Month</option>
            </select>
          </div>
          <div class="flex-1 field-group">
            <label for="searchQuery" id="searchQueryLabel" class="field-label"><i class="fa-solid fa-phone"></i> Phone number</label>
            <input type="text" id="searchQuery" placeholder="e.g. 555-0100" class="input-3d text-center" />
          </div>
          <button id="searchBtn" class="btn-3d">
            <i class="fa-solid fa-magnifying-glass"></i> Search
          </button>
        </div>
      </div>

      <div id="searchResults" class="w-full max-w-4xl mt-8 grid gap-4 sm:grid-cols-2"></div>

      <section class="flex justify-center gap-6 sm:gap-10 mt-12 stagger-in">
        <div class="tilt-wrap">
          <a href="index.html" title="Order form">
            <span data-tilt class="tilt fab glass-panel hover:shadow-glow-gold">
              <i class="fa-solid fa-house text-2xl text-brand-gold"></i>
            </span>
          </a>
        </div>
        <div class="tilt-wrap">
          <a href="invoice.html" title="View invoice">
            <span data-tilt class="tilt fab glass-panel hover:shadow-glow-terracotta">
              <i class="fa-solid fa-file-invoice-dollar text-2xl text-brand-terracotta"></i>
            </span>
          </a>
        </div>
        <div class="tilt-wrap">
          <a href="UPDATES.html" title="What's new">
            <span data-tilt class="tilt fab glass-panel hover:shadow-glow-pink">
              <i class="fa-solid fa-wand-magic-sparkles text-2xl text-brand-pink"></i>
            </span>
          </a>
        </div>
      </section>
    </main>

    <script src="./src/interactions.js"></script>
    <script src="./searchCustomerInfo.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.22.2/dist/sweetalert2.all.min.js"></script>
  </body>
</html>
