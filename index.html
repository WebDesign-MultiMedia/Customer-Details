<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buffet Lucia Fiesta Mexicana | Order Tracker</title>
    <!-- Awsome Font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- TailwindCss -->
    <link rel="stylesheet" href="./src/output.css" />
    <!-- SweetAlert -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.22.2/dist/sweetalert2.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page-shell font-form1 text-brand-navydeep">
    <!-- Floating decorative shapes -->
    <div class="blob bg-brand-gold w-72 h-72 -top-10 -left-10 animate-float-slow"></div>
    <div class="blob bg-brand-cactus w-80 h-80 top-1/3 -right-16 animate-float"></div>
    <div class="blob bg-brand-pink w-64 h-64 bottom-0 left-1/4 animate-float-slow"></div>

    <main class="relative z-10 flex flex-col items-center px-4 py-10">
      <!-- Header -->
      <div class="flex flex-col items-center mb-6 stagger-in">
        <img src="./imgs/BLFM-logo.PNG" alt="logo" class="w-20 h-20 object-contain drop-shadow-lg" />
        <h1 class="font-headings text-2xl sm:text-3xl shimmer-text text-center mt-2">
          Buffet Lucia Fiesta Mexicana
        </h1>
        <p class="text-brand-muted/80 text-sm tracking-widest uppercase">Auténtica Comida Mexicana &bull; Order Tracker</p>
      </div>

      <!-- Order Form -->
      <div class="tilt-wrap w-full max-w-3xl">
        <form
          id="custForm"
          data-tilt
          data-tilt-max="3"
          class="tilt glass-card p-6 sm:p-10 stagger-in"
        >
          <div class="flex items-center gap-2 mb-6 justify-center">
            <i class="fa-solid fa-utensils text-brand-gold text-xl"></i>
            <h2 class="text-xl sm:text-2xl font-semibold text-brand-navy">Customer Order</h2>
          </div>

          <!-- Date / Time -->
          <div class="grid grid-cols-2 gap-4 mb-5">
            <div class="field-group">
              <label for="Date" class="field-label"><i class="fa-solid fa-calendar-days"></i> Date</label>
              <input type="date" name="Date" id="Date" class="input-3d" />
            </div>
            <div class="field-group">
              <label for="Time" class="field-label"><i class="fa-solid fa-clock"></i> Time</label>
              <input type="time" name="Time" id="Time" class="input-3d" />
            </div>
          </div>

          <!-- Customer info -->
          <div class="grid sm:grid-cols-3 gap-4 mb-5">
            <div class="field-group">
              <label for="Name" class="field-label"><i class="fa-solid fa-user"></i> Name</label>
              <input type="text" name="Name" id="Name" placeholder="Customer name" class="input-3d text-center" />
            </div>
            <div class="field-group">
              <label for="Contact" class="field-label"><i class="fa-solid fa-phone"></i> Phone</label>
              <input type="text" name="Contact" id="Contact" placeholder="Customer phone" class="input-3d text-center" />
            </div>
            <div class="field-group">
              <label for="Address" class="field-label"><i class="fa-solid fa-location-dot"></i> Address</label>
              <input type="text" name="Address" id="Address" placeholder="Customer address" class="input-3d text-center" />
            </div>
          </div>

          <!-- Payment -->
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-5">
            <div class="field-group">
              <label for="PickupDelivery" class="field-label"><i class="fa-solid fa-truck-fast"></i> Type</label>
              <select name="PickupDelivery" id="PickupDelivery" class="input-3d text-center">
                <option value="">Type</option>
                <option value="Delivery">Delivery</option>
                <option value="Pick-up">Pick-up</option>
              </select>
            </div>
            <div class="field-group">
              <label for="Cost" class="field-label"><i class="fa-solid fa-dollar-sign"></i> Cost</label>
              <input type="text" name="Cost" id="Cost" placeholder="Total" class="input-3d text-center" />
            </div>
            <div class="field-group">
              <label for="Payment" class="field-label"><i class="fa-solid fa-wallet"></i> Payment</label>
              <select id="Payment" name="Payment" class="input-3d text-center">
                <option value="">Paid w/</option>
                <option value="Cash">Cash</option>
                <option value="Zelle">Zelle</option>
              </select>
            </div>
            <div class="field-group">
              <label for="Deposit" class="field-label"><i class="fa-solid fa-hand-holding-dollar"></i> Deposit</label>
              <input type="text" name="Deposit" id="Deposit" placeholder="Deposit" class="input-3d text-center" />
            </div>
          </div>

          <!-- Order details -->
          <div class="grid sm:grid-cols-3 gap-4 mb-8">
            <div class="field-group sm:col-span-2">
              <label for="Items" class="field-label"><i class="fa-solid fa-clipboard-list"></i> Items</label>
              <textarea
                name="Items"
                id="Items"
                rows="3"
                placeholder="Customer order"
                class="input-3d resize-none"
              ></textarea>
            </div>
            <div class="field-group">
              <label for="Quantity" class="field-label"><i class="fa-solid fa-hashtag"></i> Quantity</label>
              <input
                type="number"
                name="Quantity"
                id="Quantity"
                value="1"
                min="1"
                max="10"
                class="input-3d text-center"
              />
            </div>
          </div>

          <div class="flex justify-center">
            <button id="addDate" type="submit" class="btn-3d">
              <i class="fa-solid fa-paper-plane"></i> Submit Order
            </button>
          </div>
        </form>
      </div>

      <!-- Quick links -->
      <section class="flex justify-center gap-6 sm:gap-10 mt-10 stagger-in">
        <div class="tilt-wrap">
          <a
            href="https://docs.google.com/spreadsheets/d/1foMCHxncVcHoJQwxRVPxTM3o64zIDyUJZErwtLLu5qo/edit?usp=sharing"
            title="Open spreadsheet"
          >
            <span data-tilt class="tilt fab glass-panel hover:shadow-glow-teal">
              <i class="fa-solid fa-file-excel text-2xl text-brand-teal"></i>
            </span>
          </a>
        </div>
        <div class="tilt-wrap">
          <a href="search.html" title="Search orders">
            <span data-tilt class="tilt fab glass-panel hover:shadow-glow-gold">
              <i class="fa-solid fa-magnifying-glass text-2xl text-brand-gold"></i>
            </span>
          </a>
        </div>
        <div class="tilt-wrap">
          <a href="invoice.html" title="View invoice">
            <span data-tilt class="tilt fab glass-panel hover:shadow-glow-terracotta">
              <i class="fa-solid fa-file-invoice-dollar text-2xl text-brand-terracotta"></i>
            </span>
          </a>
        </div>
        <div class="tilt-wrap">
          <a href="UPDATES.html" title="What's new">
            <span data-tilt class="tilt fab glass-panel hover:shadow-glow-pink">
              <i class="fa-solid fa-wand-magic-sparkles text-2xl text-brand-pink"></i>
            </span>
          </a>
        </div>
      </section>
    </main>

    <script src="./src/interactions.js"></script>
    <script src="./sheetDb.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.22.2/dist/sweetalert2.all.min.js"></script>
  </body>
</html>
